name: Claude Dev Agent

on:
  issues:
    types: [assigned, labeled]
  issue_comment:
    types: [created]

jobs:
  claude-dev:
    # Run when:
    #   1. Issue is assigned (manual trigger)
    #   2. Issue gets 'agent:ready' label (pipeline or manual)
    #   3. Someone comments @claude on an issue
    if: >
      (github.event_name == 'issues' && github.event.action == 'assigned') ||
      (github.event_name == 'issues' && github.event.action == 'labeled' &&
       github.event.label.name == 'agent:ready') ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       !github.event.issue.pull_request)
    runs-on: ubuntu-latest
    concurrency:
      group: dev-agent-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Extract Linear issue ID
        id: linear
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          LINEAR_REF=$(echo "$ISSUE_BODY" | grep -oP '[A-Z]+-\d+' | head -1 || true)
          LINEAR_URL=$(echo "$ISSUE_BODY" | grep -oP 'https://linear\.app/[^\s\)]+' | head -1 || true)
          echo "ref=$LINEAR_REF" >> $GITHUB_OUTPUT
          echo "url=$LINEAR_URL" >> $GITHUB_OUTPUT

      - name: Move Linear issue to In Progress
        if: steps.linear.outputs.ref != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_REF: ${{ steps.linear.outputs.ref }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Post a warning on the GitHub issue so the user sees it
          warn_issue() {
            echo "::warning::$1"
            gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
              --body "$(cat <<WARN_EOF
          **Linear Sync Warning**: $1

          The dev agent will continue working, but Linear status may be out of sync.
          **Action needed**: Check the [workflow logs]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID) and verify your \`LINEAR_API_KEY\` secret is valid and not expired.
          WARN_EOF
          )" 2>/dev/null || true
          }

          if [ -z "$LINEAR_API_KEY" ]; then
            warn_issue "LINEAR_API_KEY secret is not set. Cannot update Linear issue status. Add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 0
          fi

          ISSUE_NUM=$(echo "$LINEAR_REF" | grep -oP '\d+')

          # Find the issue UUID and team
          SEARCH=$(curl -sS --max-time 15 -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --argjson num "$ISSUE_NUM" '{
              query: "query($filter: IssueFilter) { issues(filter: $filter) { nodes { id identifier team { id } } } }",
              variables: { filter: { number: { eq: $num } } }
            }')" 2>&1) || {
            warn_issue "Failed to connect to Linear API (network error or timeout). Will retry on next trigger."
            exit 0
          }

          # Check for auth/API errors
          GQL_ERROR=$(echo "$SEARCH" | jq -r '.errors[0].message // empty' 2>/dev/null)
          if [ -n "$GQL_ERROR" ]; then
            warn_issue "Linear API error: $GQL_ERROR"
            exit 0
          fi

          ISSUE_UUID=$(echo "$SEARCH" | jq -r '.data.issues.nodes[0].id // empty' 2>/dev/null)
          TEAM_ID=$(echo "$SEARCH" | jq -r '.data.issues.nodes[0].team.id // empty' 2>/dev/null)
          if [ -z "$ISSUE_UUID" ]; then
            echo "::notice::No Linear issue found matching $LINEAR_REF - skipping status update."
            exit 0
          fi

          # Find "In Progress" state for this team
          STATES=$(curl -sS --max-time 15 -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg teamId "$TEAM_ID" '{
              query: "query($teamId: String!) { team(id: $teamId) { states { nodes { id name type } } } }",
              variables: { teamId: $teamId }
            }')" 2>&1) || {
            warn_issue "Failed to fetch workflow states from Linear."
            exit 0
          }

          IN_PROGRESS_ID=$(echo "$STATES" | jq -r '.data.team.states.nodes[] | select(.name == "In Progress") | .id' 2>/dev/null)
          if [ -z "$IN_PROGRESS_ID" ]; then
            warn_issue "Linear team is missing the **In Progress** workflow state. Add it in Linear Settings > Teams > Workflow. Without it, issues won't be tracked as in-progress."
            exit 0
          fi

          # Move issue to In Progress and validate the response
          UPDATE=$(curl -sS --max-time 15 -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg id "$ISSUE_UUID" --arg stateId "$IN_PROGRESS_ID" '{
              query: "mutation($id: String!, $input: IssueUpdateInput!) { issueUpdate(id: $id, input: $input) { success } }",
              variables: { id: $id, input: { stateId: $stateId } }
            }')" 2>&1) || {
            warn_issue "Failed to update Linear issue (network error)."
            exit 0
          }

          SUCCESS=$(echo "$UPDATE" | jq -r '.data.issueUpdate.success // false' 2>/dev/null)
          if [ "$SUCCESS" = "true" ]; then
            echo "Moved $LINEAR_REF to In Progress"
          else
            UPD_ERROR=$(echo "$UPDATE" | jq -r '.errors[0].message // "unknown error"' 2>/dev/null)
            warn_issue "Failed to move $LINEAR_REF to In Progress: $UPD_ERROR"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@8cfb50531602989156055238cb98cca2db5d6bfd # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          label_trigger: "agent:ready"
          assignee_trigger: "claude"
          # TODO: Adjust --max-turns and --allowedTools for your project
          claude_args: '--max-turns 40 --allowedTools "Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(tsc:*),Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(cp:*),Bash(mv:*),Bash(chmod:*),Bash(git:*),Bash(gh:*)"'
          prompt: |
            You are a dev agent working on a GitHub issue. Read the issue carefully and implement the requested changes.

            ## Workflow

            1. **Explore the codebase**: Before writing any code, understand the project you are working in.
               - Read `package.json` to identify the tech stack, framework, and key dependencies.
               - Read the top-level directory structure (`ls -la`, then key subdirectories).
               - Read CLAUDE.md for project rules, architecture, and conventions.
               - Read 2-3 existing files in the directories you will be modifying to understand naming conventions, import style, error handling patterns, and how similar features are implemented.
               - Search for existing utilities, helpers, or components you should reuse (use Grep/Glob).
            2. **Understand the issue**: Read the issue title and body. Identify requirements, acceptance criteria, affected files, and test requirements.
            3. **Implement**: Write the code changes. Your code must match the project's existing patterns, naming conventions, and code style. Reuse existing modules and components instead of creating new ones. Do not introduce tech debt (no TODO/FIXME, no copy-paste, no pattern violations).
            4. **Verify**: Run all verification steps:
               - `npm test` (tests pass)
               - `npx tsc --noEmit` (types clean)
               - `npm run lint` (lint clean)
               - `npm run build` (build succeeds)
               If any check fails, fix the issue. If it cannot be fixed after 2 attempts, stop and report in a PR comment.
            5. **Commit**: Stage your changes and commit with a descriptive message in imperative mood.
            6. **Create PR**: Push your branch and create a pull request:
               ```
               gh pr create --title "<short title>" --body "Closes #${{ github.event.issue.number }}

               ## Summary
               <what changed and why>

               ## Completed
               - [x] <requirement 1>
               - [x] <requirement 2>
               - [ ] <anything not completed - explain why>

               ## Test plan
               <how this was tested>"
               ```

            ## Progress Tracking (CRITICAL)

            You MUST keep both GitHub and Linear updated as you work:

            **GitHub Issue checkboxes**: Update in real time as you complete each item - not in a batch at the end.
            Run `gh issue view ${{ github.event.issue.number }} --json body -q .body` to get the current body, check off items (`- [ ]` to `- [x]`), then update with `gh issue edit ${{ github.event.issue.number }} --body "<full updated body>"`.
            Aim for 3-5 progress updates over the course of the run.

            **PR task list**: After creating the PR, include a checklist in the PR body showing completed and remaining items. Update it before pushing final changes.

            ## Rules

            - Explore the codebase BEFORE implementing. Match existing patterns, naming, and style.
            - Reuse existing utilities and components. Search before creating anything new.
            - Follow project rules in CLAUDE.md
            - Use GitHub issue number #${{ github.event.issue.number }} in the PR body (NOT Linear IDs)
            - Use the Write tool to create new files (auto-creates directories)
            - Update issue checkboxes incrementally as you work
            - Do not introduce tech debt or leave TODO/FIXME comments

            ## Context

            GitHub issue: #${{ github.event.issue.number }}
            Linear issue: ${{ env.LINEAR_ISSUE_REF }} ${{ env.LINEAR_ISSUE_URL }}
        env:
          LINEAR_ISSUE_REF: ${{ steps.linear.outputs.ref }}
          LINEAR_ISSUE_URL: ${{ steps.linear.outputs.url }}
